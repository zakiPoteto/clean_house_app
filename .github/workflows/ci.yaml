name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Flutter version from mise.toml
        id: get-flutter-version
        shell: bash
        run: |
          FLUTTER_VERSION=$(grep -oP '(?<=^flutter = ")[^"]+' mise.toml || true)
          if [ -z "$FLUTTER_VERSION" ]; then
            echo "flutter_version=3.41.7" >> $GITHUB_OUTPUT
          else
            echo "flutter_version=$FLUTTER_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.get-flutter-version.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
